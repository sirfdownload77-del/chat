<!DOCTYPE html>
<html>
<head>
    <title>💬 Free Chat - No Setup Required</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .user-info {
            background: #f8f9fa;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e9ecef;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4a90e2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-status {
            font-size: 12px;
            color: #28a745;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .change-name-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .change-name-btn:hover {
            background: #e9ecef;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f5f5f5;
        }

        .message {
            max-width: 80%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .sent .message-bubble {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .received .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .typing-indicator {
            padding: 10px 20px;
            color: #666;
            font-style: italic;
            font-size: 13px;
            min-height: 40px;
            background: #f5f5f5;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        #messageInput:focus {
            border-color: #4a90e2;
        }

        #sendButton {
            padding: 12px 25px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        #sendButton:hover {
            background: #357abd;
        }

        #sendButton:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .emoji-picker {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .emoji-picker span {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .emoji-picker span:hover {
            background: #f0f0f0;
            border-radius: 5px;
        }

        .hidden {
            display: none !important;
        }

        .welcome-screen {
            padding: 40px 20px;
            text-align: center;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 20px;
        }

        .welcome-screen h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .name-input {
            display: flex;
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .name-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
        }

        .name-input button {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .online-count {
            font-size: 12px;
            color: #28a745;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>💬 Simple Free Chat</h1>
            <p>No login • No storage • 100% Free</p>
        </div>

        <!-- User Info -->
        <div class="user-info">
            <div class="avatar" id="avatar">👤</div>
            <div class="user-details">
                <div class="user-name" id="displayName">Loading...</div>
                <div class="user-status">
                    <span class="dot"></span>
                    <span id="onlineCount">0</span> online
                </div>
            </div>
            <button class="change-name-btn" onclick="showNameModal()">Change Name</button>
        </div>

        <!-- Messages Container -->
        <div class="messages" id="messages"></div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator"></div>

        <!-- Input Area -->
        <div class="input-area">
            <!-- Emoji Picker -->
            <div id="emojiPicker" class="emoji-picker hidden">
                <span onclick="addEmoji('😊')">😊</span>
                <span onclick="addEmoji('😂')">😂</span>
                <span onclick="addEmoji('❤️')">❤️</span>
                <span onclick="addEmoji('👍')">👍</span>
                <span onclick="addEmoji('🎉')">🎉</span>
                <span onclick="addEmoji('🔥')">🔥</span>
                <span onclick="addEmoji('👋')">👋</span>
                <span onclick="addEmoji('🙏')">🙏</span>
                <span onclick="addEmoji('😎')">😎</span>
                <span onclick="addEmoji('🥳')">🥳</span>
            </div>

            <div class="input-wrapper">
                <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <!-- Name Change Modal (Simple inline prompt) -->
    <div id="nameModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 10px; width: 300px;">
            <h3 style="margin-bottom: 15px;">Enter your name</h3>
            <input type="text" id="newNameInput" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #e9ecef; border-radius: 5px;" placeholder="Your name">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="hideNameModal()" style="padding: 8px 20px; background: #e9ecef; border: none; border-radius: 5px; cursor: pointer;">Cancel</button>
                <button onclick="changeName()" style="padding: 8px 20px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // =============================================
        // YOUR FIREBASE CONFIG (USING YOUR EXISTING PROJECT)
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDPwGUW6zz20uRXuUeSfIwoxmD8FmBl6QU",
            authDomain: "mychat-b052f.firebaseapp.com",
            databaseURL: "https://mychat-b052f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mychat-b052f",
            storageBucket: "mychat-b052f.firebasestorage.app",
            messagingSenderId: "20535185592",
            appId: "1:20535185592:web:6efe12e6efc94a77f7244d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // =============================================
        // APP STATE
        // =============================================
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 9),
            name: 'Anonymous_' + Math.floor(Math.random() * 1000)
        };
        
        let typingTimer;
        let isTyping = false;

        // =============================================
        // INITIALIZATION
        // =============================================
        function init() {
            updateUserDisplay();
            setupPresence();
            loadMessages();
            setupTypingListener();
            setupOnlineCount();
        }

        // Update user info in UI
        function updateUserDisplay() {
            document.getElementById('displayName').textContent = currentUser.name;
            document.getElementById('avatar').textContent = currentUser.name.charAt(0).toUpperCase();
        }

        // =============================================
        // PRESENCE SYSTEM (Free - uses Realtime DB)
        // =============================================
        function setupPresence() {
            const presenceRef = database.ref('presence/' + currentUser.id);
            const connectedRef = database.ref('.info/connected');

            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    presenceRef.onDisconnect().remove();
                    presenceRef.set({
                        name: currentUser.name,
                        online: true,
                        lastSeen: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            });
        }

        function setupOnlineCount() {
            database.ref('presence').on('value', (snapshot) => {
                const online = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('onlineCount').textContent = online;
            });
        }

        // =============================================
        // MESSAGES (Free - uses Realtime DB)
        // =============================================
        function loadMessages() {
            // Load last 50 messages
            database.ref('messages')
                .orderByChild('timestamp')
                .limitToLast(50)
                .on('child_added', (snapshot) => {
                    const message = snapshot.val();
                    message.id = snapshot.key;
                    displayMessage(message);
                });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;

            const message = {
                text: text,
                userId: currentUser.id,
                userName: currentUser.name,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('messages').push(message)
                .then(() => {
                    input.value = '';
                    stopTyping();
                })
                .catch((error) => {
                    console.error('Error:', error);
                    alert('Failed to send message. Check your connection.');
                });
        }

        function displayMessage(message) {
            const container = document.getElementById('messages');
            
            // Prevent duplicates
            if (document.getElementById(`msg-${message.id}`)) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.id = `msg-${message.id}`;
            messageDiv.className = 'message';
            
            // Check if this is my message
            if (message.userId === currentUser.id) {
                messageDiv.classList.add('sent');
            } else {
                messageDiv.classList.add('received');
            }
            
            // Format time
            let timeString = '';
            if (message.timestamp) {
                const date = new Date(message.timestamp);
                timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${message.userId !== currentUser.id ? `<div class="message-sender">${escapeHTML(message.userName)}</div>` : ''}
                    <div>${escapeHTML(message.text)}</div>
                    <div class="message-time">${timeString}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // =============================================
        // TYPING INDICATOR (Free - uses Realtime DB)
        // =============================================
        function setupTypingListener() {
            database.ref('typing').on('value', (snapshot) => {
                const typingUsers = snapshot.val();
                const indicator = document.getElementById('typingIndicator');
                
                if (!typingUsers) {
                    indicator.textContent = '';
                    return;
                }
                
                // Filter out current user
                const users = Object.entries(typingUsers || {})
                    .filter(([id, data]) => id !== currentUser.id && data.name)
                    .map(([id, data]) => data.name);
                
                if (users.length === 0) {
                    indicator.textContent = '';
                } else if (users.length === 1) {
                    indicator.textContent = `✏️ ${users[0]} is typing...`;
                } else {
                    indicator.textContent = `✏️ ${users.length} people are typing...`;
                }
            });
        }

        function startTyping() {
            if (!isTyping) {
                isTyping = true;
                database.ref('typing/' + currentUser.id).set({
                    name: currentUser.name,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }

        function stopTyping() {
            isTyping = false;
            database.ref('typing/' + currentUser.id).remove();
        }

        // =============================================
        // UI FUNCTIONS
        // =============================================
        function scrollToBottom() {
            const container = document.getElementById('messages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =============================================
        // EMOJI PICKER
        // =============================================
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.classList.toggle('hidden');
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            input.value += emoji;
            input.focus();
        }

        // =============================================
        // NAME MANAGEMENT
        // =============================================
        function showNameModal() {
            document.getElementById('nameModal').style.display = 'flex';
            document.getElementById('newNameInput').value = currentUser.name;
        }

        function hideNameModal() {
            document.getElementById('nameModal').style.display = 'none';
        }

        function changeName() {
            const newName = document.getElementById('newNameInput').value.trim();
            if (newName) {
                // Update presence with new name
                database.ref('presence/' + currentUser.id).update({
                    name: newName
                });
                
                currentUser.name = newName;
                updateUserDisplay();
                hideNameModal();
            }
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', () => {
            startTyping();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                stopTyping();
            }, 1000);
        });

        // Click outside emoji picker to close
        document.addEventListener('click', (e) => {
            const picker = document.getElementById('emojiPicker');
            const emojiBtn = document.querySelector('.emoji-btn');
            
            if (picker && !picker.contains(e.target) && !emojiBtn.contains(e.target)) {
                picker.classList.add('hidden');
            }
        });

        // Initialize app
        init();

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopTyping();
            database.ref('presence/' + currentUser.id).remove();
        });

        console.log('✅ Free Chat initialized!');
    </script>
</body>
</html>
