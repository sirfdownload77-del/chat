<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Chat PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Free Chat">
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .install-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }

        .install-btn.show {
            display: block;
        }

        .user-info {
            background: #f8f9fa;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e9ecef;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #4a90e2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-status {
            font-size: 12px;
            color: #28a745;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .change-name-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f5f5f5;
        }

        .message {
            max-width: 80%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .sent .message-bubble {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .received .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .typing-indicator {
            padding: 10px 20px;
            color: #666;
            font-style: italic;
            font-size: 13px;
            min-height: 40px;
            background: #f5f5f5;
        }

        .input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        #messageInput:focus {
            border-color: #4a90e2;
        }

        #sendButton {
            padding: 12px 25px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .notification-badge {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
        }

        .offline-banner {
            background: #ffc107;
            color: #333;
            text-align: center;
            padding: 5px;
            font-size: 12px;
            display: none;
        }

        .offline-banner.show {
            display: block;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            
            body {
                padding: 0;
            }
            
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Offline Banner -->
        <div class="offline-banner" id="offlineBanner">
            📡 You're offline - Messages will send when connected
        </div>

        <!-- Header -->
        <div class="header">
            <h1>💬 Free Chat</h1>
            <button class="install-btn" id="installBtn" onclick="installPWA()">📱 Install App</button>
        </div>

        <!-- User Info -->
        <div class="user-info">
            <div class="avatar" id="avatar">👤</div>
            <div class="user-details">
                <div class="user-name" id="displayName">Loading...</div>
                <div class="user-status">
                    <span class="dot"></span>
                    <span id="onlineCount">0</span> online
                </div>
            </div>
            <button class="change-name-btn" onclick="showNameModal()">Change</button>
        </div>

        <!-- Messages Container -->
        <div class="messages" id="messages"></div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator"></div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <!-- Name Modal -->
    <div id="nameModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 20px; border-radius: 10px; width: 300px;">
            <h3 style="margin-bottom: 15px;">Enter your name</h3>
            <input type="text" id="newNameInput" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #e9ecef; border-radius: 5px;" placeholder="Your name">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="hideNameModal()" style="padding: 8px 20px; background: #e9ecef; border: none; border-radius: 5px; cursor: pointer;">Cancel</button>
                <button onclick="changeName()" style="padding: 8px 20px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer;">Save</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // =============================================
        // YOUR FIREBASE CONFIG
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDPwGUW6zz20uRXuUeSfIwoxmD8FmBl6QU",
            authDomain: "mychat-b052f.firebaseapp.com",
            databaseURL: "https://mychat-b052f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mychat-b052f",
            storageBucket: "mychat-b052f.firebasestorage.app",
            messagingSenderId: "20535185592",
            appId: "1:20535185592:web:6efe12e6efc94a77f7244d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // =============================================
        // APP STATE
        // =============================================
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 9),
            name: 'User_' + Math.floor(Math.random() * 1000)
        };
        
        let typingTimer;
        let isTyping = false;
        let deferredPrompt;
        let offlineMessages = [];

        // =============================================
        // PWA INSTALLATION
        // =============================================
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.add('show');
        });

        function installPWA() {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User installed the app');
                }
                deferredPrompt = null;
                document.getElementById('installBtn').classList.remove('show');
            });
        }

        // =============================================
        // NOTIFICATIONS
        // =============================================
        async function requestNotificationPermission() {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    console.log('Notification permission granted');
                }
            }
        }

        function showNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                // Check if app is in background
                if (document.hidden) {
                    new Notification(title, {
                        body: body,
                        icon: 'icon-192.png',
                        badge: 'icon-192.png',
                        vibrate: [200, 100, 200]
                    });
                }
            }
        }

        // =============================================
        // OFFLINE SUPPORT
        // =============================================
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        function updateOnlineStatus() {
            const banner = document.getElementById('offlineBanner');
            if (navigator.onLine) {
                banner.classList.remove('show');
                // Send any offline messages
                sendOfflineMessages();
            } else {
                banner.classList.add('show');
            }
        }

        function saveOfflineMessage(message) {
            offlineMessages.push(message);
            localStorage.setItem('offlineMessages', JSON.stringify(offlineMessages));
        }

        async function sendOfflineMessages() {
            const saved = localStorage.getItem('offlineMessages');
            if (saved) {
                offlineMessages = JSON.parse(saved);
                for (const msg of offlineMessages) {
                    try {
                        await database.ref('messages').push(msg);
                    } catch (e) {
                        console.error('Failed to send offline message:', e);
                    }
                }
                offlineMessages = [];
                localStorage.removeItem('offlineMessages');
            }
        }

        // =============================================
        // INITIALIZATION
        // =============================================
        function init() {
            updateUserDisplay();
            setupPresence();
            loadMessages();
            setupTypingListener();
            setupOnlineCount();
            requestNotificationPermission();
            updateOnlineStatus();
            sendOfflineMessages();
        }

        function updateUserDisplay() {
            document.getElementById('displayName').textContent = currentUser.name;
            document.getElementById('avatar').textContent = currentUser.name.charAt(0).toUpperCase();
        }

        // =============================================
        // PRESENCE SYSTEM
        // =============================================
        function setupPresence() {
            const presenceRef = database.ref('presence/' + currentUser.id);
            const connectedRef = database.ref('.info/connected');

            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    presenceRef.onDisconnect().remove();
                    presenceRef.set({
                        name: currentUser.name,
                        online: true,
                        lastSeen: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            });
        }

        function setupOnlineCount() {
            database.ref('presence').on('value', (snapshot) => {
                const online = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('onlineCount').textContent = online;
            });
        }

        // =============================================
        // MESSAGES
        // =============================================
        function loadMessages() {
            database.ref('messages')
                .orderByChild('timestamp')
                .limitToLast(50)
                .on('child_added', (snapshot) => {
                    const message = snapshot.val();
                    message.id = snapshot.key;
                    displayMessage(message);
                    
                    // Show notification for new messages
                    if (message.userId !== currentUser.id) {
                        showNotification(
                            message.userName,
                            message.text.substring(0, 50) + (message.text.length > 50 ? '...' : '')
                        );
                    }
                });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;

            const message = {
                text: text,
                userId: currentUser.id,
                userName: currentUser.name,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            if (navigator.onLine) {
                database.ref('messages').push(message)
                    .then(() => {
                        input.value = '';
                        stopTyping();
                    })
                    .catch((error) => {
                        console.error('Error:', error);
                        saveOfflineMessage(message);
                        alert('Message saved. Will send when online.');
                        input.value = '';
                    });
            } else {
                saveOfflineMessage(message);
                alert('You are offline. Message saved and will send when online.');
                input.value = '';
            }
        }

        function displayMessage(message) {
            const container = document.getElementById('messages');
            
            if (document.getElementById(`msg-${message.id}`)) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.id = `msg-${message.id}`;
            messageDiv.className = 'message';
            
            if (message.userId === currentUser.id) {
                messageDiv.classList.add('sent');
            } else {
                messageDiv.classList.add('received');
            }
            
            let timeString = '';
            if (message.timestamp) {
                const date = new Date(message.timestamp);
                timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${message.userId !== currentUser.id ? `<div class="message-sender">${escapeHTML(message.userName)}</div>` : ''}
                    <div>${escapeHTML(message.text)}</div>
                    <div class="message-time">${timeString}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // =============================================
        // TYPING INDICATOR
        // =============================================
        function setupTypingListener() {
            database.ref('typing').on('value', (snapshot) => {
                const typingUsers = snapshot.val();
                const indicator = document.getElementById('typingIndicator');
                
                if (!typingUsers) {
                    indicator.textContent = '';
                    return;
                }
                
                const users = Object.entries(typingUsers || {})
                    .filter(([id, data]) => id !== currentUser.id && data.name)
                    .map(([id, data]) => data.name);
                
                if (users.length === 0) {
                    indicator.textContent = '';
                } else if (users.length === 1) {
                    indicator.textContent = `✏️ ${users[0]} is typing...`;
                } else {
                    indicator.textContent = `✏️ ${users.length} people are typing...`;
                }
            });
        }

        function startTyping() {
            if (!isTyping && navigator.onLine) {
                isTyping = true;
                database.ref('typing/' + currentUser.id).set({
                    name: currentUser.name,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }

        function stopTyping() {
            if (isTyping) {
                isTyping = false;
                database.ref('typing/' + currentUser.id).remove();
            }
        }

        // =============================================
        // UTILITY FUNCTIONS
        // =============================================
        function scrollToBottom() {
            const container = document.getElementById('messages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Name management
        function showNameModal() {
            document.getElementById('nameModal').style.display = 'flex';
            document.getElementById('newNameInput').value = currentUser.name;
        }

        function hideNameModal() {
            document.getElementById('nameModal').style.display = 'none';
        }

        function changeName() {
            const newName = document.getElementById('newNameInput').value.trim();
            if (newName) {
                database.ref('presence/' + currentUser.id).update({
                    name: newName
                });
                
                currentUser.name = newName;
                updateUserDisplay();
                hideNameModal();
            }
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        document.getElementById('sendButton').addEventListener('click', sendMessage);
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('messageInput').addEventListener('input', () => {
            startTyping();
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                stopTyping();
            }, 1000);
        });

        // Handle visibility change for notifications
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // App is in foreground, clear any badges
                document.title = 'Free Chat';
            }
        });

        // Initialize
        init();

        // Cleanup
        window.addEventListener('beforeunload', () => {
            stopTyping();
            database.ref('presence/' + currentUser.id).remove();
        });
    </script>
</body>
</html>
